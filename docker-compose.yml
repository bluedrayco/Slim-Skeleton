version: '3.7'

volumes:
    logs:
        driver: local

services:
    microservice:
        container_name: microservice-slim
        build: .
        working_dir: /var/www/html
        #command: php -S 0.0.0.0:8080 -t public
        #environment:
        #    docker: "true"
        ports:
            - "${APP_PORT}:80"
        volumes:
            - .:/var/www/html
            - logs:/var/www/logs
    
    mysql-slim:
        container_name: mysql-slim
        image: mysql:8.0.26
        command: --default-authentication-plugin=mysql_native_password
        restart: always
        env_file: .env
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}' 
            MYSQL_DATABASE: '${DB_DATABASE}'
            
    phpmyadmin:
        container_name: phpmyadmin
        image: phpmyadmin:apache
        restart: always
        environment: 
            PMA_PORT: 3306
            PMA_HOST: mysql-slim
            PMA_USER: root 
            PMA_PASSWORD: password
        ports:
            - 8081:80


    
